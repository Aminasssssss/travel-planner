<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">KZ</div>
      <h1>KZ Travel</h1>
      <p>Войдите в свой аккаунт</p>
    </div>

    <div class="form-group">
      <label>Имя пользователя</label>
      <input type="text" [(ngModel)]="username" placeholder="Введите логин" />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input type="password" [(ngModel)]="password" placeholder="Введите пароль" (keyup.enter)="login()" />
    </div>

    @if (error) {
      <div class="error">{{ error }}</div>
    }

    <button class="btn-login" (click)="login()" [disabled]="loading">
      {{ loading ? 'Входим...' : 'Войти' }}
    </button>

    <p class="register-link">
      Нет аккаунта?
      <a (click)="router.navigate(['/register'])">Зарегистрироваться</a>
    </p>
  </div>
</div>
