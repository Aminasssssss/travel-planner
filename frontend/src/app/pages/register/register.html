<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">KZ</div>
      <h1>KZ Travel</h1>
      <p>Создайте аккаунт</p>
    </div>

    <div class="form-group">
      <label>Имя пользователя</label>
      <input type="text" [(ngModel)]="username" placeholder="Введите логин" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Введите email" />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input type="password" [(ngModel)]="password" placeholder="Введите пароль" (keyup.enter)="register()" />
    </div>

    @if (error) {
      <div class="error">{{ error }}</div>
    }

    <button class="btn-login" (click)="register()" [disabled]="loading">
      {{ loading ? 'Создаём аккаунт...' : 'Зарегистрироваться' }}
    </button>

    <p class="register-link">
      Уже есть аккаунт?
      <a (click)="router.navigate(['/login'])">Войти</a>
    </p>
  </div>
</div>
